name: Deploy ATS Scanner to Cloudflare Pages

on:
  # Auto-trigger execution on pushes to primary production branches
  push:
    branches:
      - main
      - master
  
  # Manual target trigger via the GitHub Actions Interface
  workflow_dispatch:

jobs:
  deploy:
    name: Build and Deploy Enterprise Assets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Configuration
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          # Removed rigid 'cache: npm' to avoid workflow crashes when a lockfile is absent

      - name: Advanced Cache Node Modules Layer
        id: cache-nodemodules
        uses: actions/cache@v4
        env:
          cache-name: cache-node-modules
        with:
          path: node_modules
          # Added fallback evaluation logic for hashFiles so missing lockfiles won't break string parsing
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/package-lock.json', '**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-

      - name: Install Core Engine Dependencies
        run: |
          if [ -f package-lock.json ]; then
            echo "package-lock.json found. Running clean install..."
            npm ci
          else
            echo "⚠️ No lockfile found! Generating fresh node_modules state via npm install..."
            npm install
          fi

      - name: Compile and Deploy to Cloudflare Pages Matrix
        run: npm run deploy
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
