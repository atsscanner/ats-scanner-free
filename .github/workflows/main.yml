name: Deploy ATS Scanner to Cloudflare Pages

on:
  # Auto-trigger execution on pushes to primary production branches
  push:
    branches:
      - main
      - master
  
  # Manual target trigger via the GitHub Actions Interface
  workflow_dispatch:

jobs:
  deploy:
    name: Build and Deploy Enterprise Assets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Configuration
        uses: actions/checkout@v4
        with:
          # Required token parameters to authorize the auto-commit step back into the repository
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Advanced Cache Node Modules Layer
        id: cache-nodemodules
        uses: actions/cache@v4
        env:
          cache-name: cache-node-modules
        with:
          path: node_modules
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-

      - name: Resolve Dependencies and Generate Lockfile
        run: |
          if [ -f package-lock.json ]; then
            echo "✅ package-lock.json found. Running deterministic clean install..."
            npm ci
          else
            echo "⚠️ No lockfile found! Upgrading registry configurations..."
            # Adjust dynamic packages to clean target definitions before installing
            npm install @google/genai --save-exact
            npm install
            
            echo "🚀 Generating and committing missing package-lock.json to repository..."
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add package-lock.json package.json
            git commit -m "chore: auto-generate structural dependency lockfile [skip ci]"
            git push origin ${{ github.ref_name }}
          fi

      - name: Compile and Deploy to Cloudflare Pages Matrix
        run: npm run deploy
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
